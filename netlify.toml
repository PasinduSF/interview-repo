[build]
  command = "npm install"
  # 'public' holds no assets — every request is rewritten to the function below.
  publish = "public"
  functions = "netlify/functions"

[functions]
  # Swagger UI serves static assets from disk at runtime; bundle them so the
  # /api-docs page renders. (Seed data is now inlined in src/db.js — no files.)
  included_files = ["node_modules/swagger-ui-dist/**"]

# Send every request to the Express app. force = true so it wins even if a file
# with the same path exists in the publish dir (nothing sensitive is exposed).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
